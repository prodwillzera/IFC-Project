<!DOCTYPE html>
<html>
<head>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script type="text/javascript">
    google.charts.load('current', {packages: ['corechart']});
    google.charts.setOnLoadCallback(drawChart);

    async function drawChart() {
      // 1. Simulação de JSON externo (pode vir de Node.js via fetch)
      const response = await fetch('dados.json'); // substitua pelo endpoint Node.js
      const jsonData = await response.json();

      // 2. Criar DataTable
      var data = new google.visualization.DataTable();
      data.addColumn('string', 'Mes');
      const nomes = Object.keys(jsonData[0]).filter(k => k !== 'mes');
      nomes.forEach(nome => data.addColumn('number', nome));
      data.addColumn('number', 'Média');

      // 3. Adicionar linhas e calcular média
      jsonData.forEach(row => {
        const valores = nomes.map(nome => row[nome]);
        const media = valores.reduce((a,b) => a+b, 0) / valores.length;
        data.addRow([row.mes, ...valores, media]);
      });

      // 4. Opções do gráfico
      var options = {
        width: 1100,
        height: 500,
        title: 'Gráfico de Tarefas com Média',
        fontName: 'Arial',
        fontSize: 15,
        chartArea: {left: 50, top: 50, width: 900, height: 400},
        hAxis: {
          title: 'Mês',
          titleTextStyle: {color: 'purple', fontName: 'Arial', fontSize: 15},
          textStyle: {fontSize: 12}
        },
        vAxis: {
          title: 'Tarefas',
          minValue: 0
        },
        series: nomes.map((_, i) => ({color: ['blue','red','maroon','black','green','gray','purple','chocolate'][i]}))
                  .concat([{type: 'line', color: 'orange', lineWidth: 2, pointSize: 5}]),
        legend: { position: 'bottom' },
        annotations: {
          alwaysOutside: true,
          textStyle: {fontSize: 12, color: 'black', bold: true}
        },
      };

      // 5. Criar gráfico
      var chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
      chart.draw(data, options);
    }
  </script>
</head>
<body>
  <h2>Exemplo de Gráfico com Dados JSON e Média</h2>
  <div id="chart_div"></div>
</body>
</html>
