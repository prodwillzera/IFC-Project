<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Instituto Federal Catarinense - Gráfico geral</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load('current', { packages: ['corechart'] });
        google.charts.setOnLoadCallback(drawChart);

        async function drawChart() {
            try {
                // --- 1. Carregar JSON externo ---
                const response = await fetch('/grafico'); // caminho correto para subpasta 'data'
                if (!response.ok) throw new Error("Não foi possível carregar o JSON.");
                const jsonData = await response.json();

                // --- 2. Criar DataTable ---
                var data = new google.visualization.DataTable();
                data.addColumn('string', 'Mês');

                // Colunas dos colaboradores
                const nomes = [
                    ...new Set(
                        jsonData.flatMap(
                            item =>
                                Object.keys(item).filter(
                                    key => key !== 'mes'
                                )
                        )
                    )
                ];
                nomes.forEach(nome => data.addColumn('number', nome));

                // Coluna da média
                data.addColumn('number', 'Média');

                // Preencher linhas e calcular média
                jsonData.forEach(row => {
                    const valores = nomes.map(nome => row[nome]);
                    const valoresValidos = valores.filter(v => typeof v === 'number');
                    const media = valoresValidos.reduce((a, b) => a + b, 0) / valoresValidos.length;
                    data.addRow([row.mes, ...valores, media]);
                });

                // --- 3. Configurações do gráfico ---
                const cores = ['blue', 'red', 'maroon', 'black', 'green', 'gray', 'purple', 'chocolate'];
                const series = nomes.map((_, i) => ({ color: cores[i] }));
                series.push({ type: 'line', color: 'orange', lineWidth: 2, pointSize: 5 }); // Média

                const options = {
                    title: 'Avaliações dos Colaboradores (0-5)',
                    width: 1000, height: 500,
                    chartArea: { left: 50, top: 50, width: 900, height: 400 },
                    fontName: 'Arial', fontSize: 14,
                    vAxis: { title: 'Nota', minValue: 0, maxValue: 5, viewWindow: { min: 0, max: 5 }, format: '0' },
                    hAxis: { title: 'Mês', textStyle: { fontSize: 12 } },
                    series: series,
                    legend: { position: 'bottom' },
                    annotations: { alwaysOutside: true, textStyle: { fontSize: 12, bold: true } },
                    enableInteractivity: true
                };

                // --- 4. Desenhar gráfico ---
                var chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
                chart.draw(data, options);

            } catch (error) {
                console.error(error);
                document.getElementById('chart_div').innerHTML = "Erro ao carregar os dados do gráfico.";
            }
        }
    </script>
