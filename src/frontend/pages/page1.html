<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://blumenau.ifc.edu.br/wp-content/plugins/ifc-funcionalidade/res/images/favicon.png" sizes="any">
    <link rel="stylesheet" href="../assets/css/extras.css">
    <title>Recepção IFC - Campus Fraiburgo</title>
</head>
    <body class="page1">
        <div class="navbar">
            <header>
                <h3 class="title">Sistema integrado de recepção do IFC</h1>
                <nav>
                    <ul class="list">
                        <li><a class="table" href="#">Tabela de recepção</a></li>
                        <li><a class="graph" href="page2.html">Gráfico geral</a></li>
                        <li><a class="graph1" href="page3.html">Gráfico dos Setores</a></li>
                    </ul>
                </nav>
            </header>
        </div>

        <main>
            <h2 class="subtitle">Tabela de Recepção</h2>
            <table style="width:100%">
                <thead>
                    <tr>
                        <th class="day">Data</th>
                        <th class="name">Nome/Empresa</th>
                        <th class="id-card">CPF</th>
                        <th class="why">Motivo</th>
                        <th class="sector">Setor</th>
                        <th class="entry">Entrada</th>
                        <th class="exit">Saída</th>
                        <th class="score">Avaliação</th>
                    </tr>
                </thead>

                <tbody>                
                    <tr>
                        <td><input id="input-day" type="text" class="input-cell" placeholder="DD/MM/YYYY" maxlength="10"></td>
                        <td><input id="input-name" type="text" class="input-cell" placeholder="Nome/Empresa"></td>
                        <td><input id="input-id" type="text" class="input-cell" placeholder="123.456.789-00" maxlength="14"></td>
                        <td><input id="input-why" type="text" class="input-cell" placeholder="Motivo"></td>
                        <td><input id="input-sector" type="text" class="input-cell" placeholder="Setor"></td>
                        <td><input id="input-entry" type="text" class="input-cell" placeholder="HH:MM" maxlength="5"></td>
                        <td><input id="input-exit" type="text" class="input-cell" placeholder="HH:MM" maxlength="5"></td>
                        <td><input id="input-score" type="text" class="input-cell" placeholder="1-5" maxlength="1" inputmode="numeric"></td>
                    </tr>
                </tbody>
            </table>
            <input type="submit" id="submitbtn">
        </main>

        <p class="teste">Protótipo não funcional, apenas visual...</p>

        <script type="module" src="../assets/js/dashboard.js"></script>
    </body>
</html>
