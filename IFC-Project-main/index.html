<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão de Login</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body class="login_page">

        <header class="navbar">
            <h1 class="title">Sistema Integrado de Recepção do IFC</h1>
            <nav>
                <ul class="nav-list">
                    <li><a href="#" class="nav-link-contact">Contato</a></li>
                    <li><a href="#" class="nav-link-FAQ">FAQ</a></li>
                    <li><a href="#" class="nav-link-about_system">Sobre o Sistema</a></li>
                </ul>
            </nav>
        </header>

        <main class="login_area">
            <table class="login_table">
                <tr>
                    <td><input id="username" type="text" class="input-cell" placeholder="Nome de Usuário" maxlength="50"></td>
                    <td><input id="password" type="password" class="input-cell" placeholder="Senha do Usuário" maxlength="50" minlength="8"></td>
                    <td><button class="login_button" onclick="window.location.href='page1.html'">Entrar</button></td>
                </tr>
            </table>
        </main>
    </body>
</html>
