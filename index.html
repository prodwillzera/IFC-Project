<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão de Login</title>
    <link rel="icon" type="image/png" href="https://cecom.ifc.edu.br/wp-content/plugins/ifc-funcionalidade/res/images/favicon.png" sizes="any">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
    <body class="login_page">
        <header>
            <h1 class="title">Sistema Integrado de Recepção do IFC</h1>

            <nav class="navbar">
                <ul class="nav-list">
                    <li><a href="#" class="nav-link-contact">Contato</a></li>
                    <li><a href="#" class="nav-link-FAQ">FAQ</a></li>
                    <li><a href="#" class="nav-link-about_system">Sobre o Sistema</a></li>
                </ul>
            </nav>
        </header>
        <main class="container">

            <form>
                <div class="input-box">
                    <input type="text" placeholder="Login" id="user">
                </div>
                
                <div class="input-box">
                    <input type="password" placeholder="Senha" id="password">
                </div>

                <div>
                    <label>
                        <input id="rememberPass" type="checkbox">
                        Lembrar minha senha
                    </label>
                    
                    <a href="#">Esqueci minha senha</a>
                </div>

                <div class="submit-button">
                    <input type="submit">
                </div>

                <div class="register-link">
                    <p>Não tem uma conta? <a>Solicite acesso aqui</a></p>
                </div>
            </form>
            <script type="module" src="assets/js/script.js"></script>
        </main>
        <footer>
            <p>&copy; 2026 Instituto Federal Catarinense. Todos os direitos reservados.</p>
        </footer>
    </body>
</html>
