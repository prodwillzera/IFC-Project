<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão de Login</title>
    <link rel="stylesheet" href="main.css">
</head>
    <body class="login_page">
        <main class="container">

            <form>

                <h1 class="title">Sistema Integrado de Recepção do IFC</h1>

                <nav class="navbar">
                    <ul class="nav-list">
                        <li><a href="#" class="nav-link-contact">Contato</a></li>
                        <li><a href="#" class="nav-link-FAQ">FAQ</a></li>
                        <li><a href="#" class="nav-link-about_system">Sobre o Sistema</a></li>
                    </ul>
                </nav>
                <div class="input-box">
                    <input type="text" placeholder="Login" id="user">
                </div>
                
                <div class="input-box">
                    <input type="password" placeholder="Senha" id="password">
                </div>

                <div>
                    <label>
                        <input id="rememberPass" type="checkbox">
                        Lembrar minha senha
                    </label>
                    
                    <a href="#">Esqueci minha senha</a>
                </div>

                <div class="submit-button">
                    <input type="submit" onclick="logar(); return false">
                </div>

                <div class="register-link">
                    <p>Não tem uma conta? <a>Solicite acesso aqui</a></p>
                </div>
            </form]>
            <script src="js/script.js"></script>
        </main>
    </body>
</html>
